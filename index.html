<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตรวจสอบเลข Tracking — CPA Thailand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #6B1212;
      --blue:   #8B1A1A;
      --sky:    #FAF0F0;
      --gold:   #A52020;
      --white:  #FFFFFF;
      --gray50: #F7F8FA;
      --gray200:#E2E6EE;
      --gray500:#8C96A8;
      --gray800:#2D2D2D;
      --red:    #C0392B;
      --green:  #1E8A5E;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--gray50);
      color: var(--gray800);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #FFFFFF;
      border-bottom: 2px solid #8B1A1A;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-badge {
      background: var(--gold);
      color: var(--white);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 8px;
      border-radius: 3px;
    }
    header span {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 300;
    }

    .hero {
      background: linear-gradient(160deg, #4A0A0A 0%, #8B1A1A 100%);
      padding: 48px 24px 40px;
      text-align: center;
    }
    .hero-label {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      letter-spacing: 2px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .hero h1 {
      color: var(--white);
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .hero p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 300;
    }

    .card-wrap {
      display: flex;
      justify-content: center;
      padding: 32px 16px 48px;
      flex: 1;
    }
    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(107,18,18,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    .field { margin-bottom: 20px; }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .field-row .field { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }
    label .sub {
      font-weight: 300;
      color: var(--gray500);
      font-size: 12px;
      margin-left: 4px;
    }
    input[type="text"],
    input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gray200);
      border-radius: 10px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      color: var(--gray800);
      background: var(--white);
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="text"]::placeholder { color: var(--gray500); font-size: 14px; }
    input[type="text"]:focus,
    input[type="date"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(139,26,26,0.12);
    }
    input[type="text"].error,
    input[type="date"].error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(217,64,64,0.10);
    }
    .field-hint {
      font-size: 11.5px;
      color: var(--gray500);
      margin-top: 5px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--gray500);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gray200);
    }

    .btn-search {
      width: 100%;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      margin-top: 4px;
      position: relative;
    }
    .btn-search:hover { background: #7A1010; }
    .btn-search:active { transform: scale(0.98); }
    .btn-search:disabled { background: var(--gray200); color: var(--gray500); cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    }
    .btn-search.loading .spinner { display: block; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    #result { margin-top: 24px; display: none; }

    .result-success {
      background: #EDF7F2;
      border: 1.5px solid #A8DBCA;
      border-radius: 12px;
      padding: 24px 22px;
      text-align: center;
    }
    .result-success .tag {
      display: inline-block;
      background: var(--green);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .result-row {
      margin-bottom: 16px;
    }
    .result-row:last-of-type { margin-bottom: 0; }
    .result-row .label-text {
      font-size: 11px;
      color: #4A7A68;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .tracking-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 3px;
      word-break: break-all;
    }
    .dispatch-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 1px;
    }
    .result-divider {
      height: 1px;
      background: #A8DBCA;
      margin: 16px 0;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      background: none;
      border: 1.5px solid #A8DBCA;
      color: var(--green);
      border-radius: 8px;
      padding: 7px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: rgba(30,138,94,0.08); }

    .result-error {
      background: #FDF2F2;
      border: 1.5px solid #F0BEBE;
      border-radius: 12px;
      padding: 22px;
      text-align: center;
    }
    .result-error .icon { font-size: 28px; margin-bottom: 8px; }
    .result-error p { font-size: 14px; color: #8B3A3A; line-height: 1.6; }
    .result-error strong { color: var(--red); }

    .divider {
      height: 1px;
      background: var(--gray200);
      margin: 24px 0;
    }

    .footer-note {
      font-size: 12px;
      color: var(--gray500);
      text-align: center;
      line-height: 1.7;
    }
    .footer-note a { color: var(--blue); text-decoration: none; }

    footer {
      background: var(--navy);
      padding: 16px 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.25s ease;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; border-radius: 12px; }
      .hero { padding: 36px 16px 32px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlL0U2PIgQ6UVn9C2mhB8HXaf63qBx_OYxdQ&s"
         alt="CPA Thailand" style="height:40px;object-fit:contain;" />
  </div>
  <div style="margin-left:auto;">
    <img src="https://perpignan.alfmed.com/wp-content/uploads/2025/03/TOEIC-logo-green.png"
         alt="TOEIC" style="height:28px;object-fit:contain;" />
  </div>
</header>

<div class="hero">
  <div class="hero-label">TOEIC® TRACKING LOOKUP</div>
  <h1>ตรวจสอบเลข Tracking</h1>
  <p>กรอกข้อมูลให้ครบเพื่อค้นหาเลข Tracking สำหรับติดตามผลสอบ</p>
</div>

<div class="card-wrap">
  <div class="card">

    <div class="section-label">ข้อมูลผู้สมัครสอบ</div>

    <div class="field">
      <label for="id-card">เลขบัตรประชาชน <span class="sub">13 หลัก</span></label>
      <input type="text" id="id-card" placeholder="x-xxxx-xxxxx-xx-x" maxlength="13" inputmode="numeric" />
      <div class="field-hint">ไม่ต้องใส่ขีด</div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="first-name">ชื่อ <span class="sub">ภาษาอังกฤษ</span></label>
        <input type="text" id="first-name" placeholder="JOHN" />
      </div>
      <div class="field">
        <label for="last-name">นามสกุล <span class="sub">ภาษาอังกฤษ</span></label>
        <input type="text" id="last-name" placeholder="DOE" />
      </div>
    </div>

    <div class="field">
      <label for="exam-date">วันที่สอบ</label>
      <input type="date" id="exam-date" />
    </div>

    <button class="btn-search" id="btn-search" onclick="handleSearch()">
      ค้นหาเลข Tracking
      <span class="spinner"></span>
    </button>

    <div id="result"></div>

    <div class="divider"></div>

    <div class="footer-note">
      หากไม่พบข้อมูล กรุณาติดต่อเจ้าหน้าที่<br />
      โทร. <a href="tel:021234567">02-123-4567</a> หรือ
      <a href="mailto:info@cpa-th.com">info@cpa-th.com</a>
    </div>

  </div>
</div>

<footer>
  © 2025 Center for Professional Assessment (Thailand). All rights reserved.
</footer>

<div class="toast" id="toast">คัดลอกแล้ว ✓</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxwfnyVN24GTaZ02t6f2lS3_22vtq9aCRg5rZkzk5OHL5EdStElsoR6mBpaPlNi2Az-/exec';

  async function handleSearch() {
    const idInput    = document.getElementById('id-card');
    const firstInput = document.getElementById('first-name');
    const lastInput  = document.getElementById('last-name');
    const dateInput  = document.getElementById('exam-date');
    const btn        = document.getElementById('btn-search');
    const resultEl   = document.getElementById('result');

    // Reset errors
    [idInput, firstInput, lastInput, dateInput].forEach(el => el.classList.remove('error'));
    resultEl.style.display = 'none';

    const idVal    = idInput.value.trim().replace(/[-\s]/g, '');
    const firstName = firstInput.value.trim().toUpperCase();
    const lastName  = lastInput.value.trim().toUpperCase();
    const dateVal  = dateInput.value;

    // Validate
    let hasError = false;
    if (!/^\d{13}$/.test(idVal))  { idInput.classList.add('error');    hasError = true; }
    if (!firstName)                { firstInput.classList.add('error'); hasError = true; }
    if (!lastName)                 { lastInput.classList.add('error');  hasError = true; }
    if (!dateVal)                  { dateInput.classList.add('error');  hasError = true; }
    if (hasError) return;

    // Loading
    btn.disabled = true;
    btn.classList.add('loading');
    btn.childNodes[0].textContent = 'กำลังค้นหา...';

    try {
      const params = new URLSearchParams({
        id_card:    idVal,
        first_name: firstName,
        last_name:  lastName,
        exam_date:  dateVal
      });

      const res  = await fetch(`${GAS_URL}?${params}`);
      const data = await res.json();

      resultEl.style.display = 'block';

      if (data.status === 'found') {
        const dispatchText = data.dispatch_date && data.dispatch_date !== '-'
          ? formatDate(data.dispatch_date)
          : 'รอดำเนินการ';

        resultEl.innerHTML = `
          <div class="result-success">
            <div class="tag">พบข้อมูล</div>
            <div class="result-row">
              <div class="label-text">หมายเลข TRACKING</div>
              <div class="tracking-number">${data.tracking}</div>
            </div>
            <div class="result-divider"></div>
            <div class="result-row">
              <div class="label-text">วันที่ส่งออก</div>
              <div class="dispatch-value">${dispatchText}</div>
            </div>
            <button class="copy-btn" onclick="copyTracking('${data.tracking}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              คัดลอกเลข Tracking
            </button>
          </div>`;
      } else {
        resultEl.innerHTML = `
          <div class="result-error">
            <div class="icon">🔍</div>
            <p>ไม่พบข้อมูลที่ตรงกัน<br />
            กรุณาตรวจสอบ <strong>ชื่อ-นามสกุล</strong> เลขบัตรประชาชน และวันที่สอบอีกครั้ง</p>
          </div>`;
      }
    } catch (err) {
      resultEl.style.display = 'block';
      resultEl.innerHTML = `
        <div class="result-error">
          <div class="icon">⚠️</div>
          <p>เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง</p>
        </div>`;
    }

    // Restore button
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.childNodes[0].textContent = 'ค้นหาเลข Tracking';
  }

  function formatDate(dateStr) {
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const [y, m, d] = dateStr.split('-');
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${parseInt(y)+543}`;
  }

  function copyTracking(text) {
    navigator.clipboard.writeText(text).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });

  document.getElementById('id-card').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 13);
    this.classList.remove('error');
  });
  ['first-name','last-name'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.value = this.value.toUpperCase();
      this.classList.remove('error');
    });
  });
  document.getElementById('exam-date').addEventListener('change', function() {
    this.classList.remove('error');
  });
</script>
</body>
</html>
